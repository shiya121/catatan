<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>StudyAI — Catatan Cerdas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Lora:ital,wght@0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;500;600;700&family=Merriweather:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- APP ROOT -->
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <button id="btn-menu" class="icon-btn" title="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="logo">
      <div class="logo-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.44-4.54z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.44-4.54z"/></svg>
      </div>
      <span class="logo-text">StudyAI</span>
    </div>
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="text" placeholder="Cari catatan..." autocomplete="off"/>
    </div>
    <div class="header-actions">
      <span id="saved-badge" class="saved-badge hidden">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
        Tersimpan
      </span>
      <button id="btn-quiz-header" class="btn-primary" title="Buat Kuis dari Catatan Ini">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Buat Kuis
      </button>
      <div class="avatar">Z</div>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div id="layout">

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div id="sidebar-overlay" class="overlay hidden"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-top">
        <button id="btn-new-note" class="btn-new-note">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Catatan Baru
        </button>
      </div>
      <div id="note-list" class="note-list"></div>
      <div class="sidebar-stats" id="sidebar-stats"></div>
    </aside>

    <!-- EDITOR -->
    <main id="editor-area">
      <div id="editor-scroll">
        <div id="editor-inner">
          <!-- Injected by JS -->
        </div>
      </div>

      <!-- Dictation Bar -->
      <div id="dictation-bar">
        <div id="dictation-inner">
          <button id="btn-mic" class="mic-btn" title="Rekam suara">
            <svg id="mic-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <div id="dictation-content">
            <span id="dictation-hint">Klik mikrofon untuk dikte catatan...</span>
            <div id="waveform-wrap" class="hidden">
              <div id="waveform"></div>
              <div class="rec-badge"><div class="rec-dot"></div><span>REC</span></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- AI CHAT SIDEBAR (desktop) -->
    <aside id="chat-sidebar">
      <div class="chat-header">
        <div class="chat-avatar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><circle cx="19" cy="5" r="3" fill="currentColor"/></svg>
        </div>
        <div>
          <p class="chat-title">AI Asisten</p>
          <div class="chat-status"><div class="status-dot"></div><span>Online</span></div>
        </div>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-quick" id="chat-quick">
        <button class="quick-btn" data-q="Rangkum catatan ini">Rangkum</button>
        <button class="quick-btn" data-q="Buat soal latihan dari catatan ini">Soal latihan</button>
        <button class="quick-btn" data-q="Jelaskan topik ini lebih detail">Jelaskan lebih</button>
      </div>
      <div class="chat-input-wrap">
        <button id="btn-ocr-chat" class="icon-btn-sm" title="Upload gambar OCR">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
        </button>
        <div class="chat-input-box">
          <input id="chat-input" type="text" placeholder="Tanya sesuatu..." autocomplete="off"/>
          <button id="btn-send" title="Kirim">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- MOBILE BOTTOM NAV -->
  <nav id="mobile-nav">
    <button class="nav-btn" id="nav-catatan">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span>Catatan</span>
    </button>
    <button class="nav-btn" id="nav-kuis">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span>Kuis</span>
    </button>
    <button class="nav-btn" id="nav-scan">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
      <span>Scan</span>
    </button>
    <button class="nav-btn" id="nav-chat">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>AI Chat</span>
    </button>
  </nav>

</div><!-- #app -->

<!-- MODALS (injected by JS) -->
<div id="modal-root"></div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="file-input" accept="image/*" class="hidden"/>

<script src="app.js"></script>
</body>
</html>
